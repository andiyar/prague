name: Keep Supabase Alive

on:
  schedule:
    # Run daily at 9am UTC to prevent free-tier pausing
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          # Write to keepalive table (upsert) - registers as real DB activity
          write_response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d '{"id": 1, "pinged_at": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}' \
            "${{ secrets.SUPABASE_URL }}/rest/v1/keepalive")
          echo "Supabase write ping: HTTP $write_response"
          if [ "$write_response" -ne 200 ] && [ "$write_response" -ne 201 ]; then
            echo "::warning::Supabase write ping failed with HTTP $write_response"
            exit 1
          fi
